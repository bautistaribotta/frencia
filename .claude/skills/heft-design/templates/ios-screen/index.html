<!-- @template name="HEFT iOS screen" description="Dark HEFT app screen scaffold — header, content area, bottom tab bar, wired to the component bundle" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HEFT · screen template</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./ds-base.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html, body { height: 100%; margin: 0; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh;
    background: radial-gradient(120% 80% at 50% 0%, #1d1a20 0%, #0D0B0E 70%); }
  .phone { width: 390px; height: 760px; border-radius: 40px; overflow: hidden;
    background: var(--bg-app, #161317); position: relative; box-shadow: 0 40px 80px rgba(0,0,0,0.5); }
  .scroll { position: absolute; inset: 0 0 84px; overflow: auto; padding: 56px 20px 24px;
    display: flex; flex-direction: column; gap: 20px; }
  .tabwrap { position: absolute; left: 0; right: 0; bottom: 0; }
</style>
</head>
<body>
<div class="phone"><div id="root"></div></div>

<script type="text/babel" data-presets="react">
function mount() {
  const NS = window.HeftDesignSystem_377129;
  if (!NS) { return setTimeout(mount, 40); } // wait for async bundle load
  const { Card, Button, StatTile, Badge, TabBar, Tag } = NS;

  function Screen() {
    const [tab, setTab] = React.useState('home');
    React.useEffect(() => { window.lucide && lucide.createIcons(); });
    return (
      <React.Fragment>
        <div className="scroll">
          {/* ── Replace this block with your screen content ── */}
          <div>
            <span className="heft-label">Sesión de hoy</span>
            <div style={{ font: 'var(--text-title)', color: 'var(--text-primary)', marginTop: 4 }}>Empuje · A</div>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <Tag dot>Pecho</Tag><Tag dot>Hombro</Tag><Tag dot>Tríceps</Tag>
          </div>
          <Card variant="elevated" style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <StatTile label="Volumen semana" value="24.6" unit="t" size="lg" tone="green" delta="+1.2t" deltaDir="up" />
            <Button variant="primary" size="lg" icon="play" fullWidth>Empezar entrenamiento</Button>
          </Card>
          {/* ────────────────────────────────────────────────── */}
        </div>
        <div className="tabwrap">
          <TabBar value={tab} onChange={setTab}
            items={[
              { value: 'home', label: 'Hoy', icon: 'home' },
              { value: 'hist', label: 'Historial', icon: 'calendar' },
              { value: 'prog', label: 'Progreso', icon: 'trending-up' },
              { value: 'perfil', label: 'Perfil', icon: 'user' },
            ]}
            fab={{ icon: 'play', label: 'Empezar' }} />
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Screen />);
}
window.addEventListener('DOMContentLoaded', mount);
</script>
</body>
</html>
