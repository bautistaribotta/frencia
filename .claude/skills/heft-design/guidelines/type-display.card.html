<!-- @dsCard group="Type" viewport="700x220" name="Display — Anton" subtitle="Hero numbers & poster headlines. Ultra-bold condensed, UPPERCASE." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px; display: flex; align-items: center; gap: 32px; }
  .num { font-family: var(--font-display); color: var(--text-primary); line-height: 0.9; }
  .big { font-size: 92px; }
  .unit { font: var(--fw-semibold) 22px var(--font-mono); color: var(--text-tertiary); }
  .hl { color: var(--accent); }
  .poster { font-family: var(--font-display); font-size: 40px; line-height: 0.92; text-transform: uppercase; color: var(--text-primary); }
  .meta { font: var(--text-data-label); text-transform: uppercase; letter-spacing: var(--ls-wider); color: var(--text-tertiary); margin-top: 10px; }
</style>
</head>
<body>
  <div>
    <span class="num big hl">82.5</span><span class="unit"> KG</span>
    <div class="meta">Anton · 92px · hero stat</div>
  </div>
  <div>
    <div class="poster">From the first<br>squat to forever</div>
    <div class="meta">Anton · 40px · poster headline</div>
  </div>
</body>
</html>
