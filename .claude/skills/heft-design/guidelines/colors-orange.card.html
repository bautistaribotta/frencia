<!-- @dsCard group="Colors" viewport="700x180" name="Orange — intensity" subtitle="Effort heat. PRs, low RIR, AMRAP, alerts. Used sparingly." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-lg); padding: 12px; height: 120px; display: flex; flex-direction: column; justify-content: flex-end; }
  .name { font: var(--text-data-label); text-transform: uppercase; letter-spacing: var(--ls-wide); }
  .hex { font: var(--fw-semibold) 13px var(--font-mono); margin-top: 2px; }
  .dark { color: var(--ink-1000); }
  .light { color: var(--ink-100); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--orange-300)"><span class="name dark">orange-300</span><span class="hex dark">#FFB088</span></div>
    <div class="sw" style="background:var(--orange-400)"><span class="name dark">orange-400</span><span class="hex dark">#FF8A4C</span></div>
    <div class="sw" style="background:var(--orange-500);box-shadow:var(--glow-orange)"><span class="name dark">orange-500 ·</span><span class="hex dark">#FF6D29</span></div>
    <div class="sw" style="background:var(--orange-600)"><span class="name light">orange-600</span><span class="hex light">#E85002</span></div>
    <div class="sw" style="background:var(--orange-700)"><span class="name light">orange-700</span><span class="hex light">#C2410C</span></div>
  </div>
</body>
</html>
