<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px; font-family: var(--font-sans); }
  .row { display: flex; align-items: baseline; gap: 14px; margin-bottom: 12px; }
  .spec { font: 11px var(--font-mono); color: var(--text-tertiary); letter-spacing: var(--ls-wide); white-space: nowrap; }
  .t-xl { font: var(--fw-bold) 28px var(--font-sans); color: var(--text-primary); letter-spacing: var(--ls-tight); }
  .t-lg { font: var(--fw-bold) 24px var(--font-sans); color: var(--text-primary); }
  .t-md { font: var(--fw-semibold) 20px var(--font-sans); color: var(--text-primary); }
  .body { font: 17px/1.45 var(--font-sans); color: var(--text-secondary); max-width: 440px; }
</style>
</head>
<body>
  <div class="row"><span class="t-xl">Sesión de hoy</span><span class="spec">Bold · 28 / -0.02em</span></div>
  <div class="row"><span class="t-lg">Press banca</span><span class="spec">Bold · 24</span></div>
  <div class="row"><span class="t-md">Calentamiento</span><span class="spec">Semibold · 20</span></div>
  <div class="row"><span class="body">Registra la rutina que ya tienes en papel. HEFT lleva la cuenta de cada serie, repetición y RIR.</span><span class="spec">Reg · 17 / 1.45</span></div>
</body>
</html>
