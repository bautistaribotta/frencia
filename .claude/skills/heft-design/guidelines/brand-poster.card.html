<!-- @dsCard group="Brand" viewport="700x300" name="Poster voice" subtitle="Editorial, athletic, all-caps Anton over a dark gritty field." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 0; height: 100vh; background:
    radial-gradient(120% 90% at 30% 10%, #2a2530 0%, var(--ink-950) 70%);
    position: relative; overflow: hidden; }
  .grain { position: absolute; inset: 0; opacity: 0.5;
    background-image: repeating-linear-gradient(0deg, rgba(255,255,255,.02) 0 1px, transparent 1px 3px); }
  .wrap { position: relative; padding: 34px 36px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
  .headline { font-family: var(--font-display); text-transform: uppercase; font-size: 52px; line-height: 0.92; color: var(--ink-0); }
  .headline em { font-style: normal; color: var(--accent); }
  .flow { display: flex; gap: 10px; align-items: center; font: var(--text-data-label); text-transform: uppercase; letter-spacing: var(--ls-wider); color: var(--text-tertiary); }
  .flow b { color: var(--ink-100); font-weight: 500; }
  .arrow { color: var(--accent); }
  .meta { font: 11px var(--font-mono); color: var(--text-tertiary); letter-spacing: var(--ls-wide); }
</style>
</head>
<body>
  <div class="grain"></div>
  <div class="wrap">
    <div class="meta">HEFT · SYSTEM_FIELD_02 · CONDITION: SILENCE</div>
    <div class="headline">Desde la primera<br>sentadilla <em style="color: rgb(232, 80, 2)">hasta siempre.</em></div>
    <div class="flow">
      <b>CUERPO</b><span class="arrow">→</span><b>MENTE</b><span class="arrow">→</span><b>ALMA</b><span class="arrow">→</span><b>CUERPO</b>
    </div>
  </div>
</body>
</html>
