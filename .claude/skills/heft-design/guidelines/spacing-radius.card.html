<!-- @dsCard group="Spacing" viewport="700x190" name="Corner radii" subtitle="Generous iOS rounding — controls 14, cards 24, sheets 30." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px; }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 92px; height: 80px; background: var(--surface-card); border: 1px solid var(--border-default); }
  .lbl { font: 11px var(--font-mono); color: var(--text-secondary); letter-spacing: var(--ls-wide); }
  .nm { font: var(--text-data-label); text-transform: uppercase; letter-spacing: var(--ls-wide); color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="nm">sm</span><span class="lbl">10</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="nm">md</span><span class="lbl">14</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="nm">lg</span><span class="lbl">18</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="nm">xl</span><span class="lbl">24</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="nm">2xl</span><span class="lbl">30</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><span class="nm">pill</span><span class="lbl">999</span></div>
  </div>
</body>
</html>
