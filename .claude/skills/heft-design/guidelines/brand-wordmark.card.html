<!-- @dsCard group="Brand" viewport="700x200" name="Wordmark" subtitle="HEFT — Anton condensed, the bar through the H. Black field." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 0; background: var(--ink-950); height: 100vh; display: flex; align-items: center; justify-content: center; gap: 40px; }
  .mark { display: inline-flex; align-items: center; }
  .lockup { display: flex; align-items: baseline; }
  .word { font-family: var(--font-display); font-size: 64px; letter-spacing: 0.02em; color: var(--ink-0); text-transform: uppercase; }
  .dot { width: 13px; height: 13px; border-radius: 50%; background: var(--accent); margin-left: 8px; align-self: flex-end; margin-bottom: 12px; box-shadow: var(--glow-green-soft); }
  .alt { font-family: var(--font-display); font-size: 64px; color: var(--ink-1000); background: var(--accent); padding: 4px 16px; border-radius: var(--radius-md); text-transform: uppercase; }
  .tag { font: var(--text-data-label); text-transform: uppercase; letter-spacing: var(--ls-widest); color: var(--text-tertiary); margin-top: 14px; text-align: center; }
</style>
</head>
<body>
  <div style="text-align:center">
    <div class="lockup"><span class="word">HEFT</span><span class="dot"></span></div>
    <div class="tag">Cada serie cuenta</div>
  </div>
  <div style="text-align:center">
    <span class="alt">HEFT</span>
    <div class="tag">Knockout lockup</div>
  </div>
</body>
</html>
