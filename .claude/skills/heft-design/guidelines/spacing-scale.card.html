<!-- @dsCard group="Spacing" viewport="700x190" name="Spacing scale" subtitle="8px base grid. From 2px hairline gaps to 80px section breaks." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px; }
  .row { display: flex; align-items: flex-end; gap: 12px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { width: 28px; background: var(--accent); border-radius: var(--radius-xs); }
  .lbl { font: 10px var(--font-mono); color: var(--text-tertiary); letter-spacing: var(--ls-wide); }
  .px { font: var(--fw-semibold) 12px var(--font-mono); color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><span class="px">2</span><span class="lbl">1</span></div>
    <div class="item"><div class="bar" style="height:8px"></div><span class="px">4</span><span class="lbl">2</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><span class="px">8</span><span class="lbl">3</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><span class="px">12</span><span class="lbl">4</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="px">16</span><span class="lbl">5</span></div>
    <div class="item"><div class="bar" style="height:40px"></div><span class="px">20</span><span class="lbl">6</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><span class="px">24</span><span class="lbl">7</span></div>
    <div class="item"><div class="bar" style="height:64px"></div><span class="px">32</span><span class="lbl">8</span></div>
    <div class="item"><div class="bar" style="height:80px"></div><span class="px">40</span><span class="lbl">9</span></div>
    <div class="item"><div class="bar" style="height:96px"></div><span class="px">48</span><span class="lbl">10</span></div>
  </div>
</body>
</html>
