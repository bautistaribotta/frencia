<!-- @dsCard group="Components" viewport="700x300" name="Navigation — segmented & tab bar" subtitle="SegmentedControl · TabBar with center action" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 24px; }
  .demo { display: flex; flex-direction: column; gap: 20px; }
  .cap { font: 11px var(--font-mono); letter-spacing: var(--ls-wider); text-transform: uppercase; color: var(--text-tertiary); }
  .phone { max-width: 380px; border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); overflow: hidden; background: var(--bg-app); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script type="text/babel">
const { SegmentedControl, TabBar } = window.HeftDesignSystem_377129;
function Demo() {
  const [range, setRange] = React.useState('mes');
  const [tab, setTab] = React.useState('home');
  return (
    <div className="demo">
      <span className="cap">SegmentedControl</span>
      <SegmentedControl fullWidth value={range} onChange={setRange}
        options={[{value:'semana',label:'Semana'},{value:'mes',label:'Mes'},{value:'año',label:'Año'}]} />
      <span className="cap" style={{marginTop:'4px'}}>TabBar — with center action</span>
      <div className="phone">
        <TabBar value={tab} onChange={setTab}
          items={[
            {value:'home', label:'Hoy', icon:'home'},
            {value:'hist', label:'Historial', icon:'calendar'},
            {value:'prog', label:'Progreso', icon:'trending-up'},
            {value:'perfil', label:'Perfil', icon:'user'},
          ]}
          fab={{ icon:'play', label:'Empezar' }} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
setTimeout(() => window.lucide && lucide.createIcons(), 60);
</script>
</body>
</html>
