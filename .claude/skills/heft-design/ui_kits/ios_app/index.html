<!-- @dsCard group="iOS App" viewport="402x720" name="HEFT iOS app" subtitle="Interactive — Hoy, registro de serie, progreso, stub de sesión" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HEFT · iOS</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { height: 100%; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; background: radial-gradient(120% 80% at 50% 0%, #1d1a20 0%, var(--ink-950) 70%); }
  #root { transform-origin: center; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script src="data.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="WorkoutLogScreen.jsx"></script>
<script type="text/babel" src="ProgressScreen.jsx"></script>
<script type="text/babel" src="SessionStub.jsx"></script>

<script type="text/babel" data-presets="react">
const { TabBar, Card, StatTile, Badge, Switch, Avatar, Button } = window.HeftDesignSystem_377129;

// ---- Lightweight extra screens (history + profile) ----
function HistoryScreen() {
  const s = window.HEFT_DATA.session;
  const rows = [
    { d: 'Hoy · 07:42', r: 'Empuje · A', v: '12 480', pr: 1 },
    { d: 'Mar · 06:55', r: 'Tirón · A', v: '14 220', pr: 0 },
    { d: 'Dom · 09:10', r: 'Pierna · A', v: '21 050', pr: 2 },
    { d: '9 jun · 07:30', r: 'Empuje · B', v: '11 900', pr: 0 },
  ];
  return (
    <div style={{ padding: '56px 20px 120px', display: 'flex', flexDirection: 'column', gap: 14 }}>
      <div><span className="heft-label">Historial</span>
        <div style={{ font: 'var(--text-title)', color: 'var(--text-primary)', marginTop: 4 }}>Junio</div></div>
      {rows.map((row, i) => (
        <Card key={i} hairline interactive style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div>
            <div style={{ font: 'var(--fw-bold) 16px var(--font-sans)', color: 'var(--text-primary)' }}>{row.r}</div>
            <span className="heft-label" style={{ marginTop: 3, display: 'block' }}>{row.d}</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            {row.pr > 0 ? <Badge tone="orange" icon="flame">{row.pr} PR</Badge> : null}
            <StatTile value={row.v} unit="kg" size="sm" />
          </div>
        </Card>
      ))}
    </div>
  );
}

function ProfileScreen() {
  const [a, setA] = React.useState(true);
  const [b, setB] = React.useState(false);
  const [c, setC] = React.useState(true);
  const Setting = ({ label, sub, val, set }) => (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 16px', borderBottom: '1px solid var(--divider)' }}>
      <div><div style={{ font: 'var(--fw-medium) 15px var(--font-sans)', color: 'var(--text-primary)' }}>{label}</div>
        {sub ? <span className="heft-label" style={{ display: 'block', marginTop: 2 }}>{sub}</span> : null}</div>
      <Switch checked={val} onChange={set} />
    </div>
  );
  return (
    <div style={{ padding: '56px 20px 120px', display: 'flex', flexDirection: 'column', gap: 20 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
        <Avatar name="Marco Ríos" size="lg" ring />
        <div><div style={{ font: 'var(--text-subtitle)', color: 'var(--text-primary)' }}>Marco Ríos</div>
          <span className="heft-label">12 días seguidos · 148 sesiones</span></div>
      </div>
      <Card variant="inset" style={{ padding: 0, overflow: 'hidden' }}>
        <Setting label="Avisar al terminar el descanso" sub="Notificación + vibración" val={a} set={setA} />
        <Setting label="Unidades en libras (lb)" val={b} set={setB} />
        <Setting label="Mostrar RIR al registrar" val={c} set={setC} />
      </Card>
      <Button variant="secondary" size="lg" icon="settings" fullWidth>Ajustes avanzados</Button>
    </div>
  );
}

// ---- App shell ----
function App() {
  const [view, setView] = React.useState('tabs'); // tabs | workout | stub
  const [tab, setTab] = React.useState('home');

  React.useEffect(() => { window.lucide && lucide.createIcons(); });

  let content;
  if (view === 'workout') content = <WorkoutLogScreen onFinish={() => setView('stub')} />;
  else if (view === 'stub') content = <SessionStub onDone={() => { setView('tabs'); setTab('home'); }} />;
  else if (tab === 'home') content = <HomeScreen onStart={() => setView('workout')} />;
  else if (tab === 'hist') content = <HistoryScreen />;
  else if (tab === 'prog') content = <ProgressScreen />;
  else content = <ProfileScreen />;

  const showTabs = view === 'tabs';

  return (
    <IOSDevice dark width={402} height={812}>
      <div style={{ position: 'relative', minHeight: '100%' }}>
        {content}
        {showTabs ? (
          <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, zIndex: 40 }}>
            <TabBar value={tab} onChange={setTab}
              items={[
                { value: 'home', label: 'Hoy', icon: 'home' },
                { value: 'hist', label: 'Historial', icon: 'calendar' },
                { value: 'prog', label: 'Progreso', icon: 'trending-up' },
                { value: 'perfil', label: 'Perfil', icon: 'user' },
              ]}
              fab={{ icon: 'play', label: 'Empezar', onClick: () => setView('workout') }} />
          </div>
        ) : null}
      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
